name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build + package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/release.sh "$VERSION"

      - name: Notarize
        # notarize.sh exits 0 gracefully when credentials are absent.
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          TARBALL="$(ls dist/*.tar.gz)"
          scripts/notarize.sh "$TARBALL"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "v${VERSION}" dist/*.tar.gz \
            --title "v${VERSION}" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_REPO: ${{ secrets.TAP_REPO }}
          GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for TARBALL in dist/*.tar.gz; do
            ARCH="$(echo "$TARBALL" | grep -oE 'arm64|x86_64')"
            SHA="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
            scripts/update-tap.sh "$VERSION" "$SHA" "$ARCH"
          done
